<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CozyOS School Store & Inventory Matrix</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        :root { --emerald: #002B1B; --gold: #C5A059; --dark-card: #181818; }
        body { background: #0e0e0e; color: #eaeaea; font-family: 'Inter', sans-serif; padding: 40px; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; margin-top: 30px; }
        .inventory-card { background: var(--dark-card); border: 1px solid rgba(197, 160, 89, 0.1); border-radius: 8px; padding: 20px; transition: transform 0.2s; }
        .inventory-card:hover { transform: translateY(-4px); border-color: var(--gold); }
        .badge-stock { padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; float: right; }
        .stock-ok { background: rgba(0, 200, 80, 0.15); color: #00ff55; }
        .stock-low { background: rgba(255, 50, 50, 0.15); color: #ff4444; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="action-bar">
    <div>
        <h1 style="margin:0; color: var(--gold);">📦 School Inventory & Merchandise Store</h1>
        <p style="margin:5px 0 0 0; font-size:13px; color:#aaa;">Manage distribution loops for uniforms, text books, and learning tracking assets.</p>
    </div>
    <button class="cozy-btn-gold" style="padding:12px 20px;" onclick="triggerSupplyAudit()">Run Core Stock Audit</button>
</div>

<div class="store-grid" id="inventoryGrid">
    <!-- Automated item rendering template tracks mapping block -->
</div>

<script type="module">
    import Storage from './core/storage.js';
    import Events from './core/events.js';

    const stockCatalog = [
        { id: "uni_01", item: "Official School Blazer (Green)", type: "Uniforms", qty: 142, price: 3200 },
        { id: "bk_math", item: "KLB Secondary Mathematics Form 4", type: "Books", qty: 8, price: 850 },
        { id: "ex_02", item: "CozyOS Branded Exercise Book A5", type: "Stationery", qty: 2400, price: 70 },
        { id: "lunch_cr", item: "Digital RFID Meal Procurement Pass", type: "Merchandise", qty: 512, price: 150 }
    ];

    window.renderStoreCatalog = function() {
        const grid = document.getElementById("inventoryGrid");
        grid.innerHTML = stockCatalog.map(prod => {
            const stockStatusClass = prod.qty < 20 ? "stock-low" : "stock-ok";
            return `
                <div class="inventory-card">
                    <span class="badge-stock ${stockStatusClass}">STK: ${prod.qty}</span>
                    <h3 style="margin: 0 0 10px 0; font-size:16px; color:#fff;">${prod.item}</h3>
                    <p style="margin: 0; font-size:12px; color:#aaa;">Category: <strong>${prod.type}</strong></p>
                    <div style="margin-top: 20px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="color:var(--gold); font-weight:bold; font-size:15px;">KES ${prod.price.toLocaleString()}</span>
                        <button style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:6px 12px; border-radius:4px; cursor:pointer;" onclick="dispatchItemSale('${prod.id}')">Issue Item</button>
                    </div>
                </div>
            `;
        }).join('');
    };

    window.dispatchItemSale = async function(itemId) {
        const product = stockCatalog.find(p => p.id === itemId);
        if (product && product.qty > 0) {
            product.qty--;
            renderStoreCatalog();
            console.log(`Inventory issue transaction logged for entity reference: [${itemId}]`);
            Events.publish("inventory:item_dispatched", { itemId, remaining: product.qty });
        }
    };

    document.addEventListener("DOMContentLoaded", () => {
        renderStoreCatalog();
    });
</script>
</body>
</html>
