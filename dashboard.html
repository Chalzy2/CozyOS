<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyOS Production Workspace</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #121212;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f3e5ab;
            --accent-emerald: #0f5132;
            --emerald-glow: #198754;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #262626;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        @media (min-width: 768px) {
            .dashboard-container {
                grid-template-columns: 280px 1fr;
            }
        }

        .workspace-sidebar {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .workspace-sidebar {
                border-bottom: none;
                border-right: 1px solid var(--border-color);
                height: 100vh;
                position: sticky;
                top: 0;
            }
        }

        .brand-title {
            color: var(--accent-gold);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0;
        }

        .main-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-sizing: border-box;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .control-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .status-card {
            background: linear-gradient(145deg, #161616, #0f0f0f);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            position: relative;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #198754;
            box-shadow: 0 0 8px var(--emerald-glow);
            display: inline-block;
            margin-right: 6px;
        }

        .card-title {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 1.25rem;
            font-weight: 600;
        }

        #terminal-input {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: white;
            flex-grow: 1;
            outline: none;
            box-sizing: border-box;
        }
        
        #terminal-input:focus {
            border-color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="workspace-sidebar">
            <div>
                <h1 class="brand-title">CozyOS Workspace</h1>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin: 4px 0 0 0;">System Shell v1.0</p>
            </div>
            <nav style="display: flex; flex-direction: column; gap: 8px; margin-top: 20px;">
                <div style="color: var(--accent-gold); padding: 8px 12px; border-left: 2px solid var(--accent-gold); background: rgba(212, 175, 55, 0.05); font-weight: 500;">
                    🎛️ Core Terminal
                </div>
                <div style="color: var(--text-secondary); padding: 8px 12px;">📦 Modules</div>
                <div style="color: var(--text-secondary); padding: 8px 12px;">⚙️ Tenants</div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="control-header">
                <h2 class="control-title">Control Dashboard</h2>
                <div style="padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; background: rgba(15, 81, 50, 0.1); border: 1px solid var(--accent-emerald);">
                    <span class="status-indicator"></span> Core Online
                </div>
            </header>

            <section class="status-grid">
                <div class="status-card">
                    <div class="card-title">Tenant State</div>
                    <div class="card-value">Isolated</div>
                </div>
                <div class="status-card">
                    <div class="card-title">SDK Framework</div>
                    <div class="card-value">v1.0 Frozen</div>
                </div>
                <div class="status-card">
                    <div class="card-title">Active Plugins</div>
                    <div class="card-value" id="plugin-count">0 Loaded</div>
                </div>
            </section>

            <section class="status-card" style="display: flex; flex-direction: column; gap: 12px; min-height: 350px;">
                <div class="card-title" style="border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Unified AI Core Ingestion Gateway</div>
                <div id="terminal-output" style="background-color: #050505; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 0.9rem; flex-grow: 1; color: var(--text-secondary); overflow-y: auto;">
                    <div>⚡ CozyOS Kernel initialized. Ready for context queries...</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="terminal-input" placeholder="Query industry context...">
                    <button id="execute-btn" style="background-color: var(--accent-emerald); border: none; border-radius: 6px; color: white; padding: 0 16px; font-weight: 600; cursor: pointer;">Execute</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        function syncTelemetry() {
            const plugins = window.CozyOS?.PluginMetadata || new Map();
            const activeCount = Array.from(plugins.values()).filter(m => m.status === 'enabled').length;
            document.getElementById('plugin-count').innerText = `${activeCount} Active`;
        }

        async function postQuery() {
            const input = document.getElementById('terminal-input');
            const output = document.getElementById('terminal-output');
            if (!input || !output) return;

            const text = input.value.trim();
            if (!text) return;

            output.innerHTML += `<div style="color: #ffffff; margin-top: 6px;">&gt; ${text}</div>`;
            input.value = '';

            try {
                if (window.CozyOS && typeof window.CozyOS.executeVoiceIntent === 'function') {
                    const res = await window.CozyOS.executeVoiceIntent(text);
                    output.innerHTML += `<div style="color: var(--accent-gold); margin-top: 2px;">${res.responseText}</div>`;
                } else {
                    output.innerHTML += `<div style="color: var(--text-secondary); margin-top: 2px;">💡 Kernel Gateway Sandbox: Intent log recorded. Engine is offline.</div>`;
                }
            } catch (err) {
                output.innerHTML += `<div style="color: #dc3545; margin-top: 2px;">🚨 Exception: ${err.message}</div>`;
            }
            output.scrollTop = output.scrollHeight;
        }

        window.addEventListener('DOMContentLoaded', () => {
            syncTelemetry();
            document.getElementById('execute-btn').addEventListener('click', postQuery);
            document.getElementById('terminal-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') postQuery();
            });
        });
    </script>
 <script src="core/pluginManager.js"></script>
<script src="plugins/mpesaOS.js"></script>
    <script src="plugins/pharmacyOS.js"></script>
<script src="core/dashboard.js"></script>
</body>
</html>
    
</body>
</html>
