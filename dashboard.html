<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyOS Workspace Shell</title>
    
    <!-- Premium Workspace UI Theme Tokens Mapping -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #06080a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .cozy-app-layout {
            display: flex;
            min-height: 100vh;
        }
        .cozy-sidebar {
            width: 260px;
            background-color: #0b0d0f;
            border-right: 1px solid #1f242b;
            padding: 20px 0;
        }
        .cozy-sidebar h2 {
            padding: 0 20px;
            font-size: 18px;
            color: #C5A059; /* Premium Gold Signature Accent Token */
            margin-bottom: 20px;
        }
        .cozy-sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .cozy-main-content {
            flex: 1;
            padding: 30px;
        }
        /* Unified Responsive Flex Matrix Grid Layout Grid system */
        .cozy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        /* Global Framework Card Styling Blocks */
        .cozy-dashboard-card {
            background-color: #0b0d0f;
            border: 1px solid #1f242b;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, border-color 0.2s;
        }
        .cozy-dashboard-card:hover {
            border-color: #C5A059;
        }
    </style>
</head>
<body>

    <div class="cozy-app-layout">
        <!-- Sidebar Shell Node Elements Insertion Target -->
        <aside class="cozy-sidebar">
            <h2>CozyOS Workspace</h2>
            <ul id="cozy-sidebar-nav">
                <!-- JavaScript automatically populates sidebar navigation entries here -->
            </ul>
        </aside>

        <!-- Dynamic Grid Matrix Interface Window Pane View Target -->
        <main class="cozy-main-content">
            <header style="margin-bottom: 20px;">
                <h1 style="margin: 0; font-size: 24px; font-weight: 500;">Control Dashboard</h1>
            </header>
            
            <div id="cozy-dashboard-grid" class="cozy-grid">
                <!-- JavaScript automatically mounts dynamic architecture modules here -->
            </div>
        </main>
    </div>

    <!-- BOOTSTRAP OPERATIONAL CONSOLE WRAPPERS -->
    <script type="module">
        import DashboardShell from './core/dashboard.js';
        
        // Bootstraps modules and populates the UI once components settle safely
        document.addEventListener("DOMContentLoaded", async () => {
            console.log("⚙️ CozyOS Interface Core: Initializing dynamic view matrices compilation...");
            try {
                await DashboardShell.bootstrap();
            } catch (error) {
                console.error("Initialization Fault:", error);
            }
        });
    </script>
</body>
</html>
