<!DOCTYPE html>
<html lang="en" data-cozy-app="platform-admin">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyOS Production Workspace</title>
    <link rel="stylesheet" href="core/ui/cozy-tokens.css">
    <link rel="stylesheet" href="core/ui/cozy-components.css">
    <link rel="stylesheet" href="core/modules/developer/developer-hub.css">
    <style>
        /* REWORKED (visual redesign per reference design): light content
         * area with a dark navy sidebar and a proper header bar, replacing
         * the earlier dark-glass-everywhere look. Every color below reads
         * from the shared --cozy-* tokens (cozy-tokens.css's reworked
         * platform-admin block) with the same value hardcoded as a
         * fallback, so nothing breaks if tokens fail to load. */
        :root {
            --bg-primary: var(--cozy-bg-gradient, #f8fafc);
            --bg-surface: var(--cozy-glass-bg, #ffffff);
            --accent-gold: var(--cozy-brand-primary, #1B5E20);
            --accent-gold-hover: var(--cozy-brand-glow, rgba(27,94,32,0.15));
            --accent-emerald: #1B5E20;
            --emerald-glow: #00A86B;
            --text-primary: var(--cozy-text, #0f172a);
            --text-secondary: var(--cozy-muted, #475569);
            --border-color: var(--cozy-border, #E2E8F0);
            --sidebar-bg: var(--cozy-sidebar-bg, #0f172a);
            --sidebar-text: var(--cozy-sidebar-text, #e2e8f0);
            --sidebar-text-muted: var(--cozy-sidebar-text-muted, #94a3b8);
            --sidebar-hover: var(--cozy-sidebar-hover, #1e293b);
            --sidebar-active-bg: var(--cozy-sidebar-active-bg, #16A34A);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--cozy-font-family, var(--cozy-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif));
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --------------------------------------------------------------
         * Structural CSS for cozy-workspace.js's real generated markup
         * (.cozy-shell / .cozy-sidebar / .cozy-nav-link / etc.).
         * -------------------------------------------------------------- */
        #cozy-workspace-root { min-height: 100vh; }

        .cozy-shell {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }
        /* Lowered from 768px: Chrome's "Request Desktop Site" on mobile
         * doesn't reliably override an effective viewport width above this
         * page's own width=device-width meta tag, so a higher breakpoint
         * could fail to trigger even in desktop-site mode on some devices.
         * 600px triggers reliably while still being a reasonable mobile
         * cutoff for genuinely narrow real phone viewports. */
        @media (min-width: 600px) {
            .cozy-shell { grid-template-columns: 260px 1fr; transition: grid-template-columns 0.25s cubic-bezier(0.16,1,0.3,1); }
            .cozy-shell.cozy-sidebar-collapsed { grid-template-columns: 64px 1fr; }
        }

        .cozy-sidebar-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .cozy-sidebar-toggle {
            flex: 0 0 auto; width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12); background: transparent;
            color: var(--sidebar-text-muted); cursor: pointer; font-size: 13px;
        }
        .cozy-sidebar-toggle:hover { color: #fff; border-color: var(--emerald-glow); }

        /* Accordion nav sections: one open at a time via JS-driven .open class */
        .cozy-nav-section-label {
            display: flex; align-items: center; gap: 8px; width: 100%;
            background: none; border: none; cursor: pointer; text-align: left;
            color: var(--sidebar-text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 12px 4px;
        }
        .cozy-nav-section-arrow { display: inline-block; font-size: 9px; transition: transform 0.15s ease; }
        .cozy-nav-section.open > .cozy-nav-section-label .cozy-nav-section-arrow { transform: rotate(90deg); }
        .cozy-nav-section-items {
            display: grid; grid-template-rows: 0fr; overflow: hidden;
            transition: grid-template-rows 0.25s cubic-bezier(0.16,1,0.3,1);
        }
        .cozy-nav-section-items > * { min-height: 0; }
        .cozy-nav-section.open > .cozy-nav-section-items { grid-template-rows: 1fr; }

        /* Collapsed: icons/labels hidden except via title tooltip, sections
         * force-expanded so items are still reachable as an icon rail. */
        .cozy-shell.cozy-sidebar-collapsed .cozy-shell-title,
        .cozy-shell.cozy-sidebar-collapsed .cozy-rediscover-btn,
        .cozy-shell.cozy-sidebar-collapsed .cozy-nav-section-label span:not(.cozy-nav-section-arrow),
        .cozy-shell.cozy-sidebar-collapsed .cozy-nav-link-label {
            display: none;
        }
        .cozy-shell.cozy-sidebar-collapsed .cozy-nav-section-items { grid-template-rows: 1fr !important; }
        .cozy-shell.cozy-sidebar-collapsed .cozy-sidebar { width: 64px; overflow-x: hidden; }
        .cozy-shell.cozy-sidebar-collapsed .cozy-nav-link { text-align: center; }

        .cozy-mobile-menu-btn {
            display: none; width: 32px; height: 32px; border-radius: 6px;
            border: 1px solid var(--border-color); background: transparent;
            color: var(--text-primary); cursor: pointer; font-size: 15px; order: -1;
        }

        .cozy-mobile-overlay { display: none; }
        @media (max-width: 599px) {
            .cozy-mobile-menu-btn { display: inline-flex; align-items: center; justify-content: center; }
            .cozy-sidebar-toggle { display: none; }
            .cozy-mobile-overlay {
                display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 25;
            }
            .cozy-sidebar {
                position: fixed; top: 0; bottom: 0; left: 0; width: 240px; z-index: 30;
                transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
            }
            .cozy-shell.cozy-sidebar-mobile-open .cozy-sidebar { transform: translateX(0); }
            .cozy-shell.cozy-sidebar-mobile-open .cozy-mobile-overlay { display: block; }
            .cozy-shell.cozy-sidebar-mobile-open .cozy-shell-title,
            .cozy-shell.cozy-sidebar-mobile-open .cozy-rediscover-btn,
            .cozy-shell.cozy-sidebar-mobile-open .cozy-nav-link-label { display: initial; }
        }

        .cozy-sidebar {
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 20px 12px;
        }
        @media (min-width: 600px) {
            .cozy-sidebar {
                border-bottom: none;
                height: 100vh;
                position: sticky;
                top: 0;
                overflow-y: auto;
            }
        }

        .cozy-shell-title {
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .cozy-rediscover-btn {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--sidebar-text-muted);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .cozy-rediscover-btn:hover { border-color: var(--emerald-glow); color: #ffffff; }

        .cozy-nav-section { margin-bottom: 10px; }
        .cozy-nav-section-label {
            color: var(--sidebar-text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 12px 4px;
        }
        /* .cozy-nav-link base layout comes from cozy-components.css; these
         * rules restyle it specifically for the dark sidebar context. */
        .cozy-sidebar .cozy-nav-link {
            color: var(--sidebar-text);
            border-radius: 6px;
            margin: 1px 4px;
        }
        .cozy-sidebar .cozy-nav-link:hover { background: var(--sidebar-hover); color: #ffffff; }
        .cozy-sidebar .cozy-nav-link.active {
            background: var(--sidebar-active-bg);
            color: #ffffff;
            border-left-color: var(--emerald-glow);
            font-weight: 600;
        }

        .cozy-main-wrap { display: flex; flex-direction: column; min-height: 100vh; }

        /* Header bar: brand context lives in the sidebar already, so this
         * status bar plays the "top header" role (search/status/session) —
         * restyled to sit on light background with real contrast, matching
         * the reference header's spirit without fabricating a search box
         * or notification system that isn't real yet. */
        .cozy-status-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-surface);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .cozy-main { padding: 28px; flex-grow: 1; }
        .cozy-main h2 { font-size: 1.5rem; margin: 0 0 12px; color: var(--text-primary); }
        .cozy-main h3 { color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.03em; }

        .cozy-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .cozy-list > .cozy-nav-link {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            color: var(--text-primary);
        }
        .cozy-module-row {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: var(--text-primary);
        }
        .cozy-module-row-main {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .cozy-module-row-main b { font-size: 0.95rem; }
        .cozy-module-row-meta {
            display: flex; gap: 18px; flex-wrap: wrap;
            font-size: 0.8rem; color: var(--text-secondary);
        }

        .cozy-grid { display: grid; gap: 16px; margin-top: 12px; }
        .cozy-card-label { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .cozy-card-value { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); }

        .cozy-disclosure-note { color: var(--text-secondary); font-size: 0.8rem; font-style: italic; margin: 4px 0 12px; }

        .cozy-devhub-embedded-nav {
            display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 18px;
            padding: 10px; background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 10px;
        }
        .cozy-devhub-embedded-nav .cozy-nav-item {
            padding: 6px 12px; border-radius: 6px; font-size: 0.82rem; text-decoration: none;
        }
        .cozy-devhub-embedded-nav .cozy-nav-item.active {
            background: var(--sidebar-active-bg); color: #ffffff; font-weight: 600;
        }

        /* --- New: Dashboard hero + stat cards + quick actions, matching
         * the reference design's home layout. Real data only — stat
         * numbers come from actual connected coordinators (Certification's
         * application count, Module Manager's coordinator count, real user
         * count when Identity is connected), never fabricated. --- */
        .cozy-hero {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: var(--cozy-glass-shadow, none);
        }
        .cozy-hero h1 { margin: 0 0 4px; font-size: 1.4rem; color: var(--text-primary); }
        .cozy-hero p { margin: 0; color: var(--text-secondary); font-size: 0.9rem; }
        .cozy-hero-status {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(27,94,32,0.1); color: var(--accent-emerald);
            padding: 6px 14px; border-radius: 999px; font-size: 0.8rem; font-weight: 600;
        }
        .cozy-hero-status::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-emerald); display: inline-block; }

        .cozy-stat-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px; margin-bottom: 20px;
        }
        .cozy-stat-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 10px;
            padding: 16px 18px; box-shadow: var(--cozy-glass-shadow, none);
        }
        .cozy-quick-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px;
        }
        .cozy-quick-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 10px;
            padding: 16px; cursor: pointer; transition: border-color 0.15s;
            box-shadow: var(--cozy-glass-shadow, none);
        }
        .cozy-quick-card:hover { border-color: var(--accent-emerald); }
        .cozy-quick-card .cozy-card-label { margin-bottom: 2px; }

        .cozy-feature-card {
            background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 10px;
            padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--cozy-glass-shadow, none);
        }
        .cozy-feature-card-head {
            display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
        }

        .cozy-shell-footer {
            padding: 16px 28px;
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }

        #terminal-input:focus { border-color: var(--accent-gold); outline: none; }
        #terminal-input, #execute-btn { transition: border-color var(--cozy-transition-fast, 0.15s), background var(--cozy-transition-fast, 0.15s); }
        #terminal-input { background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); }
        #terminal-output { background: #ffffff !important; color: var(--text-secondary) !important; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <!-- Additive: single mount point for the real Enterprise Control Center
         (core/shell/cozy-workspace.js). Its mount() call builds its own
         sidebar/topbar/main structure inside this div — nothing else in
         this file writes to it directly. -->
    <div id="cozy-workspace-root">
        <noscript>The CozyOS Administrator Workspace requires JavaScript.</noscript>
    </div>

    <!-- CozyOS Shell UI Services (core/ui/). Loaded first: cozy-theme.js
         applies the active theme immediately on construction (reading the
         data-cozy-app="platform-admin" attribute already set on <html>
         above), so it should run before anything else that might read
         theme-dependent CSS variables.
         - cozy-theme.js / cozy-background.js: real, verified compatible,
           but required a new "platform-admin" theme profile to be added
           (see migration log) — without it, both would have defaulted the
           whole Administrator Workspace to Developer Hub's green/gold theme
           and particle background. That gap is now closed: cozy-tokens.css
           has a platform-admin block, cozy-theme.js registers it, and
           cozy-background.js has a dedicated (subtle, emerald/gold mesh)
           scene for it — Developer Hub keeps its own "developer" theme.
         - cozy-toast.js / cozy-live.js: zero risk, no per-app coupling,
           real API verified to match every existing call in
           developer-hub.js and cozy-ui.js exactly (Toast.show(),
           Live.publish()/subscribe()). -->
    <script src="core/ui/cozy-theme.js"></script>
    <script src="core/ui/cozy-background.js"></script>
    <script src="core/ui/cozy-toast.js"></script>
    <script src="core/ui/cozy-live.js"></script>

    <!-- 0. PLATFORM FOUNDATION REGISTRIES — loaded first (plain, non-deferred)
         so their synchronous self-registration completes before anything
         else queries them. cozy-workspace.js already has dormant,
         bounded-retry integration code expecting window.CozyOS.ServiceRegistry
         (Application Center + Module Manager metadata) — no code change was
         needed there, only loading this file. module-registry.js is loaded
         too (real, verified file) but has no current Administrator Workspace
         consumer yet — it's the app-launch/dashboard-placement resolver for
         a future loadModule() flow, not a catalog/display coordinator. -->
    <script src="core/registry/cozy-registry.js"></script>
    <!-- Real bug fix: identity-engine.js has never had a script tag on this
         page, despite every PlatformOperations/PlatformResourceManager/
         ApplicationVisibility/ContentPresentation permission check
         depending on window.CozyOS.IdentityEngine. Every one of those
         checks has been correctly failing closed this whole time (never
         wrongly open) — but Identity itself needs to actually load for a
         real login flow to ever succeed here. -->
    <script src="core/modules/identity/identity-engine.js"></script>
    <!-- Platform Administrator trusted-device login, new-device
         verification, and emergency recovery. Reads
         window.CozyOS.IdentityEngine.isPlatformAdmin() for role checks;
         loaded right after it so that dependency is always ready first. -->
    <script src="core/modules/identity/admin-recovery-policy.js"></script>
    <!-- Real implementation of window.CozyOS.Auth.getCurrentIdentity(),
         a contract already referenced elsewhere in this codebase
         (core/ui/cozy-base-linker.js, modules/quarry/*) but never
         implemented until now. Listens to IdentityEngine/
         AdminRecoveryPolicy session events; loaded after both. -->
    <script src="core/modules/identity/cozy-auth.js"></script>
    <!-- Milestone 120: real session snapshot service. Loaded before
         AuthCoordinator so establishFromIdentity()/establishFromExternalAuth()
         are available the first time AuthCoordinator needs them. -->
    <script src="core/modules/session/cozy-session-service.js"></script>
    <!-- Milestone 120: thin Administrator Login orchestration only.
         Composes IdentityEngine, CozyOS.Auth, CozyOS.Session, and
         AdminRecoveryPolicy — does not duplicate or replace any of them.
         Loaded last in this chain since it depends on all four. -->
    <script src="core/modules/identity/auth-coordinator.js"></script>
    <!-- Real bug fix: cozy-context-engine.js was migrated to
         PlatformEventBus in an early milestone but never received a
         script tag on this specific page. -->
    <script src="core/context/cozy-context-engine.js"></script>
    <script src="core/modules/module-registry.js"></script>

    <!-- Shared Platform Strengthening: PlatformEventBus / ModuleLoadingManager
         (core/shell/) — the one shared event bus and load-lifecycle manager
         every coordinator/application should use. -->
    <script src="core/shell/platform-event-bus.js"></script>
    <script src="core/shell/module-loading-manager.js"></script>

    <!-- Platform Discovery Engine dependency chain (core/platform/) — load
         order matters: FileRegistry/ManifestRegistry are pure storage (no
         dependencies), DependencyEngine/UsageEngine read FileRegistry,
         HealthEngine reads both of those, and platform-discovery.js
         (the merged engine) reads/writes all of them. Each degrades
         honestly if an earlier one in the chain isn't present — see each
         file's own header for its exact optional-dependency behavior. -->
    <script src="core/platform/file-registry.js"></script>
    <script src="core/platform/manifest-registry.js"></script>
    <script src="core/platform/dependency-engine.js"></script>
    <script src="core/platform/usage-engine.js"></script>
    <script src="core/platform/health-engine.js"></script>

    <!-- Platform Discovery Engine (core/shell/platform-discovery.js) — reads
         and writes to the five files above; does not reimplement any of
         them. Merged from two independently-built implementations into one
         authoritative engine — see its own header for the full merge
         history and the Runtime-vs-Manifest provider model. -->
    <script src="core/shell/platform-discovery.js"></script>

    <!-- Platform Audit Engine (core/platform/audit-engine.js) — pure
         consumer, sits above Discovery/Dependency/Usage/Health/Registry in
         the chain. Discovers nothing itself; answers diagnostic questions
         by correlating what those engines already report. -->
    <script src="core/platform/audit-engine.js"></script>

    <!-- Platform Operations Engine (core/platform/platform-operations.js) —
         the execution layer. Orchestrator only; never fabricates a
         lifecycle capability a coordinator doesn't have. Fails closed
         without real Identity authorization. -->
    <script src="core/platform/platform-operations.js"></script>

    <!-- Platform Resource Manager (core/platform/platform-resource-manager.js)
         — manages ownership, allocation, tracking, and release of shared
         resources. Does not discover, execute operations, or classify
         health/usage — reuses PlatformDiscovery/FileRegistry/PluginManager/
         CozyStorage/UsageEngine/HealthEngine for all of that. -->
    <script src="core/platform/platform-resource-manager.js"></script>

    <!-- Reference Integrity Engine (core/platform/reference-integrity-engine.js)
         — proactively checks real script/stylesheet/image tag resolution.
         The exact class of check that would have caught the mpesaOS.js,
         developer-hub.css, QuarryOS, and Certification path bugs before
         deployment. -->
    <script src="core/platform/reference-integrity-engine.js"></script>

    <!-- Vendor System (Rule 61) — moved from core/platform/ to core/
         directly, matching the final requested architecture where all 5
         vendor files sit as siblings. Loaded in real dependency order:
         Registry and Loader have no dependencies on each other; Events
         wraps the existing PlatformEventBus; Diagnostics reads Registry+
         Loader; Manager coordinates all three plus Events. -->
    <!-- Output Center (Rule 68) — promoted from a private Developer Hub
         field to a real, shared platform service, matching the same
         pattern as the Vendor system below. Loaded in real dependency
         order: core engine first (storage's restore() call at load time
         depends on it existing), then storage, then the independent
         history/collections/export helpers. -->
    <script src="core/output/output-center.js"></script>
    <script src="core/output/output-storage.js"></script>
    <script src="core/output/output-history.js"></script>
    <script src="core/output/output-events.js"></script>
    <script src="core/output/output-collections.js"></script>
    <script src="core/output/output-export.js"></script>
    <!-- Output Inbox (Rule 71) — real, single arrival point forwarding to
         OutputCenter.publish(); adds a genuinely separate "every arrival,
         accepted or rejected" audit trail. -->
    <script src="core/output/output-inbox.js"></script>

    <!-- Calculation Engine (Rule 74) — single, shared platform service for
         formulas every CozyOS application should use instead of
         implementing its own math. Registry and History load first (no
         mutual dependencies); Library registers real formulas against
         Registry; Engine and Certification both depend on Registry. -->
    <script src="core/calculation/formula-registry.js"></script>
    <script src="core/calculation/calculation-history.js"></script>
    <script src="core/calculation/formula-library.js"></script>
    <script src="core/calculation/formula-library-church.js"></script>
    <!-- New packs (Rule 77) — added after the existing, certified Business/
         Church packs above, neither of which was modified. -->
    <script src="core/calculation/packs/statistics.js"></script>
    <script src="core/calculation/packs/education.js"></script>
    <script src="core/calculation/packs/healthcare.js"></script>
    <script src="core/calculation/packs/payroll.js"></script>
    <script src="core/calculation/packs/conversions.js"></script>
    <script src="core/calculation/packs/inventory.js"></script>
    <script src="core/calculation/packs/accounting.js"></script>
    <script src="core/calculation/packs/finance.js"></script>
    <script src="core/calculation/packs/logistics.js"></script>
    <script src="core/calculation/packs/agriculture.js"></script>
    <script src="core/calculation/packs/construction.js"></script>
    <script src="core/calculation/packs/manufacturing.js"></script>
    <script src="core/calculation/packs/engineering.js"></script>

    <!-- Formula Dependency Engine (Rule 84) — real, explicit dependsOn
         metadata only, never source parsing. Graph/History load first (no
         mutual dependencies); Events depends on History; Engine depends
         on Graph; Certification depends on Engine. -->
    <script src="core/calculation/dependency-graph.js"></script>
    <script src="core/calculation/dependency-history.js"></script>
    <script src="core/calculation/dependency-events.js"></script>
    <script src="core/calculation/dependency-engine.js"></script>
    <script src="core/calculation/dependency-certification.js"></script>

    <!-- Enterprise UI Standard — Module Dashboard (Rule 87) — shared,
         reusable dashboard component every CozyOS module can call with
         its own config. -->

    <!-- 3. BOOTSTRAP: mount the Workspace Shell once it and its scripts have
         loaded. Bounded retry (same convention already used elsewhere in
         CozyOS, e.g. developer-hub.js's own initStandaloneMount) covers
         defer/script-order timing rather than assuming a fixed load order. -->
    <script>
        (function bootWorkspace() {
            const root = document.getElementById("cozy-workspace-root");
            function tryMount() {
                if (window.CozyOS && window.CozyOS.WorkspaceShell && typeof window.CozyOS.WorkspaceShell.mount === "function") {
                    window.CozyOS.WorkspaceShell.mount(root);
                    return true;
                }
                return false;
            }
            function mountWorkspaceWhenReady() {
                if (tryMount()) return;
                let attempts = 0;
                const intervalId = setInterval(() => {
                    attempts++;
                    if (tryMount() || attempts >= 40) clearInterval(intervalId);
                }, 250);
            }
            // Milestone 121: gate real WorkspaceShell mounting behind real
            // Administrator Login. If LoginGate itself fails to load, this
            // still waits (bounded, above) rather than mounting the
            // Workspace open regardless — but does not invent a login
            // requirement out of thin air if LoginGate is genuinely absent.
            if (window.CozyOS && window.CozyOS.LoginGate && typeof window.CozyOS.LoginGate.mountIfNeeded === "function") {
                window.CozyOS.LoginGate.mountIfNeeded(root, mountWorkspaceWhenReady);
            } else {
                mountWorkspaceWhenReady();
            }
        })();
    </script>
