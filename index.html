<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyOS Production Workspace</title>
    <!-- Link to our production UI stylesheet -->
    <link rel="stylesheet" href="core/dashboard.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Workspace Sidebar Panel Layout -->
        <aside class="workspace-sidebar">
            <div class="brand-block">
                <h1 class="brand-title">CozyOS Workspace</h1>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin: 4px 0 0 0;">System Shell v1.0</p>
            </div>
            
            <nav style="display: flex; flex-direction: column; gap: 8px; margin-top: 20px;">
                <div style="color: var(--accent-gold); padding: 8px 12px; border-left: 2px solid var(--accent-gold); background: rgba(212, 175, 55, 0.05); font-weight: 500;">
                    🎛️ Core Terminal
                </div>
                <div style="color: var(--text-secondary); padding: 8px 12px; cursor: pointer;">
                    📦 Marketplace Modules
                </div>
                <div style="color: var(--text-secondary); padding: 8px 12px; cursor: pointer;">
                    ⚙️ Security & Tenants
                </div>
            </nav>
        </aside>

        <!-- Main Content Control Panel -->
        <main class="main-content">
            <header class="control-header">
                <h2 class="control-title">Control Dashboard</h2>
                <div id="connection-badge" class="status-card" style="padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; background: rgba(15, 81, 50, 0.1); border-color: var(--accent-emerald);">
                    <span class="status-indicator"></span> Core Online
                </div>
            </header>

            <!-- Dynamic Metrics Interface Section -->
            <section class="status-grid">
                <div class="status-card">
                    <div class="card-title">Tenant State</div>
                    <div class="card-value" id="active-tenant">Isolated</div>
                </div>
                <div class="status-card">
                    <div class="card-title">SDK Framework</div>
                    <div class="card-value">v1.0 Frozen</div>
                </div>
                <div class="status-card">
                    <div class="card-title">Active Plugins</div>
                    <div class="card-value" id="plugin-count">0 Loaded</div>
                </div>
            </section>

            <!-- Command Console Engine Module -->
            <section class="status-card" style="flex-grow: 1; display: flex; flex-direction: column; gap: 12px;">
                <div class="card-title" style="border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Unified AI Core Ingestion Gateway</div>
                <div id="terminal-output" style="background-color: #050505; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 0.9rem; flex-grow: 1; min-height: 250px; color: var(--text-secondary); overflow-y: auto;">
                    <div>⚡ CozyOS Kernel initialized. Ready for context queries...</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="terminal-input" placeholder="Query industry context..." style="background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 12px; color: white; flex-grow: 1; outline: none;">
                    <button id="execute-btn" style="background-color: var(--accent-emerald); border: none; border-radius: 6px; color: white; padding: 0 16px; font-weight: 600; cursor: pointer;">Execute</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Load our dynamic dashboard script entry point -->
    <script src="core/dashboard.js"></script>
</body>
</html>
