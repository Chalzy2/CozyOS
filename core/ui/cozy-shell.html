<body data-cozy-app="developer">

    <!-- 1. Unified CozyOS Top Brand & Action Bar -->
    <header class="cozy-top-navigation">
        <div class="cozy-brand-block">
            <span class="cozy-logo-mark">◈</span>
            <span class="cozy-app-title">CozyOS Developer Hub</span>
        </div>
        <div class="cozy-top-actions">
            <div class="cozy-live-pill" id="universal-live-pill">
                <span class="cozy-pulse-indicator"></span>
                <span class="cozy-pill-text">SYS_STATUS: ACTIVE</span>
            </div>
        </div>
    </header>

    <!-- 2. Universal Navigation Sidebar -->
    <aside id="cozy-sidebar" class="cozy-side-navigation">
        <nav class="cozy-nav-menu">
            <a href="#" class="cozy-nav-item active" data-target-app="developer">
                <span class="icon">⌂</span> Dashboard
            </a>
            <a href="#" class="cozy-nav-item" data-target-app="builder">
                <span class="icon">🔨</span> Builder
            </a>
            <a href="#" class="cozy-nav-item" data-target-app="bugfixer">
                <span class="icon">🐛</span> BugFixer
            </a>
            <a href="#" class="cozy-nav-item" data-target-app="ocr">
                <span class="icon">📷</span> OCR
            </a>
        </nav>
    </aside>

    <!-- 3. Dynamic Workspace Viewport (Only this gets modified by developer-hub.js) -->
    <main class="cozy-main-workspace">
        <div id="cozy-developer-hub-root">
            <!-- Your JS will render Dashboard cards, Builder elements, or OCR modules right here! -->
            <noscript>The CozyOS Developer Hub requires JavaScript.</noscript>
        </div>
    </main>

    <!-- 4. Universal Diagnostics Statusbar -->
    <footer class="cozy-bottom-statusbar">
        <div class="cozy-status-left"><span>LOC_NODE: 1.002.AFR</span></div>
        <div class="cozy-status-center"></div>
        <div class="cozy-status-right"><span>_RUNTIME: ACTIVE</span></div>
    </footer>

</body>
