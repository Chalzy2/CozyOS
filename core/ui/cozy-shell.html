<!DOCTYPE html>
<html lang="en" data-cozy-app="developer">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyOS Master Shell Template</title>
    
    <link rel="stylesheet" href="cozy-tokens.css">
    <link rel="stylesheet" href="cozy-theme.css">
    <link rel="stylesheet" href="cozy-layout.css">
    <link rel="stylesheet" href="cozy-components.css">
    <link rel="stylesheet" href="cozy-animations.css">
    
    </head>
<body data-cozy-app="developer">

    <header class="cozy-top-navigation">
        <div class="cozy-brand-block">
            <span class="cozy-logo-mark">◈</span>
            <span class="cozy-app-title">CozyOS Workspace</span>
        </div>
        <div class="cozy-top-actions">
            <div class="cozy-live-pill" id="universal-live-pill">
                <span class="cozy-pulse-indicator"></span>
                <span class="cozy-pill-text">SYS_STATUS: ACTIVE</span>
            </div>
        </div>
    </header>
<div class="cozy-app-container">
    <!-- Sidebar -->
    <aside id="cozy-sidebar">
        <div class="cozy-sidebar-header">Developer Hub</div>
        <nav id="cozy-nav-menu">
            <!-- Your buttons go here -->
        </nav>
    </aside>

    <!-- Main Workspace -->
    <main class="cozy-main-content" id="cozy-app-root">
        <!-- The plugin content will be injected here -->
    </main>
</div>

    <main class="cozy-main-workspace">
        <div id="cozy-app-root">
            </div>
    </main>

    <footer class="cozy-bottom-statusbar">
        <div class="cozy-status-left"><span>LOC_NODE: 1.002.AFR</span></div>
        <div class="cozy-status-center"></div>
        <div class="cozy-status-right"><span>_RUNTIME: ACTIVE</span></div>
    </footer>

    <script src="cozy-theme.js" defer></script>
    <script src="cozy-background.js" defer></script>
    <script src="cozy-live.js" defer></script>
    <script src="cozy-toast.js" defer></script>
    <script src="cozy-navigation.js" defer></script>
    <script src="cozy-ui.js" defer></script>

</body>
</html>
