<!DOCTYPE html>
<html lang="en" data-cozy-app="developer">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyOS Workspace</title>

    <!-- Core Styles -->
    <link rel="stylesheet" href="cozy-tokens.css">
    <link rel="stylesheet" href="cozy-theme.css">
    <link rel="stylesheet" href="cozy-layout.css">
    <link rel="stylesheet" href="cozy-components.css">
    <link rel="stylesheet" href="cozy-animations.css">
</head>

<body data-cozy-app="developer">

<header class="cozy-top-navigation">

    <div class="cozy-brand-block">
        <span class="cozy-logo-mark">◈</span>
        <span class="cozy-app-title">CozyOS Workspace</span>
    </div>

    <div class="cozy-top-actions">
        <div class="cozy-live-pill" id="universal-live-pill">
            <span class="cozy-pulse-indicator" data-cozy-live-pulse="normal"></span>
            <span class="cozy-pill-text">
                SYS_STATUS: ACTIVE
            </span>
        </div>
    </div>

</header>

<div class="cozy-app-container">

    <!-- Sidebar -->
    <aside id="cozy-sidebar">

        <div class="cozy-sidebar-header">
            Applications
        </div>

        <!-- Dynamic Navigation -->
        <nav id="cozy-nav-menu">
            <!-- cozy-navigation.js builds this automatically -->
        </nav>

    </aside>

    <!-- Workspace -->
    <main id="cozy-app-root" class="cozy-main-workspace">

        <div class="cozy-loading">
            Select an application...
        </div>

    </main>

</div>

<footer class="cozy-bottom-statusbar">

    <div class="cozy-status-left">
        LOC_NODE: 1.002.AFR
    </div>

    <div class="cozy-status-center"></div>

    <div class="cozy-status-right">
        RUNTIME: ACTIVE
    </div>

</footer>

<!-- ========================= -->
<!-- Engineering Layer -->
<!-- ========================= -->

<script src="../modules/module-registry.js"></script>
<script src="../modules/identity/identity-engine.js"></script>

<!-- ========================= -->
<!-- Shell -->
<!-- ========================= -->

<script src="cozy-theme.js"></script>
<script src="cozy-background.js"></script>
<script src="cozy-live.js"></script>
<script src="cozy-toast.js"></script>
<script src="cozy-ui.js"></script>
<script src="cozy-navigation.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {

    if (window.buildSidebar) {
        buildSidebar("system");
    }

});
</script>

</body>
</html>
